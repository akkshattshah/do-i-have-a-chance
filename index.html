<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do I Have A Chance?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Screen system ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      -webkit-overflow-scrolling: touch;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ══════════════════════════════════════
       SCREEN 1 — HOME
       ══════════════════════════════════════ */
    #screen-home {
      height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 100px 20px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(44px, 9vw, 96px);
      letter-spacing: 3px;
      line-height: 1.05;
      text-transform: uppercase;
      margin-bottom: 10px;
      white-space: nowrap;
    }

    .subtitle {
      color: #aaa;
      font-size: 14px;
      line-height: 1.5;
      max-width: 460px;
      margin-bottom: 24px;
      font-family: 'Courier New', monospace;
    }

    .upload-section {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .upload-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .upload-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2.5px dashed #333;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s, transform 0.2s;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
    }

    .upload-circle:hover {
      border-color: #666;
      background: #111;
      transform: scale(1.05);
    }

    .upload-circle.has-image {
      border-color: #fff;
      border-style: solid;
    }

    .upload-circle input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-circle .preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: none;
    }

    .upload-circle.has-image .preview-img {
      display: block;
    }

    .upload-circle.has-image .upload-icon {
      display: none;
    }

    .upload-icon {
      font-size: 28px;
      color: #444;
      line-height: 1;
    }

    .upload-label {
      font-size: 11px;
      color: #555;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .vs-badge {
      font-family: 'Anton', sans-serif;
      font-size: 24px;
      color: #333;
      user-select: none;
      margin-top: -16px;
    }

    .check-btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 14px 50px;
      font-family: 'Anton', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 20px;
    }

    .check-btn:hover {
      background: #e0e0e0;
    }

    .check-btn:active {
      transform: scale(0.97);
    }

    .recently-header {
      font-size: 11px;
      letter-spacing: 4px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .ticker-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .ticker-wrap {
      width: 100vw;
      overflow: hidden;
      position: relative;
      margin-bottom: 8px;
    }

    .ticker-wrap::before,
    .ticker-wrap::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 80px;
      z-index: 2;
      pointer-events: none;
    }

    .ticker-wrap::before {
      left: 0;
      background: linear-gradient(to right, #000, transparent);
    }

    .ticker-wrap::after {
      right: 0;
      background: linear-gradient(to left, #000, transparent);
    }

    .ticker {
      display: flex;
      gap: 10px;
      animation: scroll-left 30s linear infinite;
      width: max-content;
    }

    .ticker-row-2 .ticker {
      animation: scroll-right 35s linear infinite;
    }

    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes scroll-right {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    .ticker-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #111;
      border: 1px solid #222;
      border-radius: 100px;
      padding: 8px 16px 8px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ticker-tag .pair {
      display: flex;
      align-items: center;
    }

    .ticker-tag .mini-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #000;
    }

    .ticker-tag .mini-avatar:last-child {
      margin-left: -8px;
    }

    .ticker-tag .mini-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ticker-tag .tag-result {
      font-size: 12px;
      color: #999;
      font-weight: 500;
    }

    .ticker-tag .tag-result.yes { color: #4ade80; }
    .ticker-tag .tag-result.no { color: #f87171; }
    .ticker-tag .tag-result.maybe { color: #facc15; }

    .bottom-container {
      padding: 10px 20px 16px;
      text-align: center;
      flex-shrink: 0;
    }

    .secret-line {
      font-size: 13px;
      color: #333;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      transition: color 0.3s;
    }

    .secret-line:hover {
      color: #666;
    }

    /* ══════════════════════════════════════
       SCREEN 2 — LOADING / ANALYSING
       ══════════════════════════════════════ */
    #screen-loading {
      justify-content: center;
      align-items: center;
      background: #000;
    }

    .loading-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #222;
      border-top-color: #f87171;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }

    .loading-step {
      color: #555;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease, color 0.3s ease;
    }

    .loading-step.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .loading-step.done {
      color: #fff;
    }

    .loading-step .step-icon {
      display: inline-block;
      width: 18px;
      text-align: center;
    }

    .step-icon.check { color: #4ade80; }
    .step-icon.arrow {
      color: #f87171;
      animation: blink 0.6s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ══════════════════════════════════════
       SCREEN 3 — RESULTS
       ══════════════════════════════════════ */
    #screen-result {
      justify-content: center;
      align-items: center;
      background: #000;
      overflow-y: auto;
    }

    .result-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 40px 20px;
      max-width: 600px;
      width: 100%;
    }

    .result-photos {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .result-person {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .result-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #222;
    }

    .result-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .result-rating {
      font-family: 'Anton', sans-serif;
      font-size: 48px;
      letter-spacing: 2px;
      line-height: 1;
    }

    .result-rating-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .result-vs {
      font-family: 'Anton', sans-serif;
      font-size: 20px;
      color: #333;
      margin-top: 30px;
    }

    .result-verdict {
      font-family: 'Anton', sans-serif;
      font-size: clamp(22px, 5vw, 36px);
      text-align: center;
      line-height: 1.3;
      letter-spacing: 1px;
      max-width: 520px;
    }

    .result-verdict.verdict-red { color: #f87171; }
    .result-verdict.verdict-yellow { color: #facc15; }
    .result-verdict.verdict-green { color: #4ade80; }

    .result-subtext {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #555;
      text-align: center;
      max-width: 400px;
      line-height: 1.5;
    }

    .try-again-btn {
      background: transparent;
      color: #fff;
      border: 1px solid #333;
      padding: 12px 40px;
      font-family: 'Anton', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
    }

    .try-again-btn:hover {
      border-color: #fff;
      background: #111;
    }

    /* ── Chance meter ── */
    .chance-meter {
      width: 100%;
      max-width: 400px;
    }

    .chance-label {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
      text-align: center;
    }

    .chance-label span {
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: 1px;
    }

    .chance-bar-track {
      width: 100%;
      height: 10px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
    }

    .chance-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 1s ease-out;
    }

    /* ── Shake animation ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .check-btn.shake {
      animation: shake 0.4s ease;
    }

    /* ── Responsive ── */

    @media (max-width: 768px) {
      .container {
        padding: 48px 16px 8px;
      }

      h1 { margin-bottom: 6px; }
      .subtitle { margin-bottom: 16px; }
      .upload-section { gap: 20px; margin-bottom: 16px; }
      .check-btn { margin-bottom: 14px; }

      .result-inner {
        gap: 18px;
        padding: 28px 16px;
      }

      .result-photos { gap: 24px; }

      .result-avatar {
        width: 100px;
        height: 100px;
      }

      .result-rating { font-size: 40px; }
      .result-vs { margin-top: 16px; }
      .chance-meter { max-width: 320px; }
    }

    @media (max-width: 500px) {
      #screen-home {
        height: auto;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: auto;
      }

      .container {
        padding: 28px 16px 6px;
      }

      h1 {
        white-space: normal;
        font-size: clamp(32px, 11vw, 52px);
        letter-spacing: 1px;
        margin-bottom: 4px;
      }

      .subtitle {
        font-size: 12px;
        margin-bottom: 14px;
      }

      .upload-section {
        gap: 14px;
        margin-bottom: 14px;
      }

      .upload-group { gap: 5px; }

      .upload-circle {
        width: 76px;
        height: 76px;
      }

      .upload-icon { font-size: 20px; }
      .upload-label { font-size: 10px; letter-spacing: 1px; }

      .vs-badge {
        font-size: 18px;
        margin-top: -10px;
      }

      .check-btn {
        padding: 11px 34px;
        font-size: 15px;
        margin-bottom: 10px;
      }

      .recently-header {
        font-size: 9px;
        letter-spacing: 3px;
        margin-bottom: 6px;
      }

      .ticker-wrap { margin-bottom: 5px; }

      .ticker-tag {
        padding: 5px 10px 5px 5px;
      }

      .ticker-tag .mini-avatar {
        width: 22px;
        height: 22px;
      }

      .ticker-tag .tag-result { font-size: 10px; }

      .bottom-container { padding: 6px 16px 10px; }
      .secret-line { font-size: 11px; }

      /* Loading screen mobile */
      .loading-inner { gap: 24px; }
      .spinner { width: 40px; height: 40px; }
      .loading-steps { font-size: 13px; gap: 8px; }

      /* Result screen mobile */
      #screen-result {
        justify-content: center;
      }

      .result-inner {
        gap: 14px;
        padding: 24px 16px 20px;
      }

      .result-photos { gap: 14px; }

      .result-person { gap: 6px; }

      .result-avatar {
        width: 76px;
        height: 76px;
        border-width: 2px;
      }

      .result-rating {
        font-size: 30px;
        letter-spacing: 1px;
      }

      .result-rating-label {
        font-size: 9px;
        letter-spacing: 1px;
      }

      .result-vs {
        font-size: 14px;
        margin-top: 12px;
      }

      .result-verdict {
        font-size: clamp(17px, 5vw, 24px);
        max-width: 90vw;
        padding: 0 4px;
      }

      .chance-meter { max-width: 260px; }
      .chance-label { font-size: 12px; margin-bottom: 5px; }
      .chance-label span { font-size: 17px; }
      .chance-bar-track { height: 7px; }

      .result-subtext {
        font-size: 11px;
        max-width: 280px;
        padding: 0 4px;
      }

      .try-again-btn {
        padding: 9px 28px;
        font-size: 13px;
      }
    }

    @media (max-width: 360px) {
      h1 { font-size: 28px; }

      .upload-circle {
        width: 70px;
        height: 70px;
      }

      .result-avatar {
        width: 68px;
        height: 68px;
      }

      .result-rating { font-size: 28px; }
      .result-photos { gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- ════════ SCREEN 1: HOME ════════ -->
  <div class="screen active" id="screen-home">
    <div class="container">
      <h1>Do I Have A Chance?</h1>
      <p class="subtitle">Upload photos and let's see if you have a chance with her or not.</p>

      <div class="upload-section">
        <div class="upload-group">
          <div class="upload-circle" id="uploadYou" onclick="this.querySelector('input').click()">
            <input type="file" accept="image/*" onchange="handleUpload(this, 'you')" onclick="event.stopPropagation()">
            <img class="preview-img" id="previewYou" alt="Your photo">
            <div class="upload-icon">+</div>
          </div>
          <div class="upload-label">You</div>
        </div>

        <div class="vs-badge">&</div>

        <div class="upload-group">
          <div class="upload-circle" id="uploadThem" onclick="this.querySelector('input').click()">
            <input type="file" accept="image/*" onchange="handleUpload(this, 'them')" onclick="event.stopPropagation()">
            <img class="preview-img" id="previewThem" alt="Their photo">
            <div class="upload-icon">+</div>
          </div>
          <div class="upload-label">Them</div>
        </div>
      </div>

      <button class="check-btn" onclick="startAnalysis()">Find Out</button>

      <div class="recently-header">Recently Checked</div>
    </div>

    <div class="ticker-area">
      <div class="ticker-wrap">
        <div class="ticker" id="ticker1"></div>
      </div>
      <div class="ticker-wrap ticker-row-2">
        <div class="ticker" id="ticker2"></div>
      </div>
    </div>

    <div class="bottom-container">
      <div class="secret-line">want to check anonymously?</div>
    </div>
  </div>

  <!-- ════════ SCREEN 2: LOADING ════════ -->
  <div class="screen" id="screen-loading">
    <div class="loading-inner">
      <div class="spinner"></div>
      <div class="loading-steps" id="loadingSteps">
        <div class="loading-step" data-step="0">
          <span class="step-icon arrow">&#9656;</span> Scanning your face...
        </div>
        <div class="loading-step" data-step="1">
          <span class="step-icon arrow">&#9656;</span> Scanning their face...
        </div>
        <div class="loading-step" data-step="2">
          <span class="step-icon arrow">&#9656;</span> Comparing features...
        </div>
        <div class="loading-step" data-step="3">
          <span class="step-icon arrow">&#9656;</span> Calculating your chances...
        </div>
      </div>
    </div>
  </div>

  <!-- ════════ SCREEN 3: RESULT ════════ -->
  <div class="screen" id="screen-result">
    <div class="result-inner">
      <div class="result-photos">
        <div class="result-person">
          <div class="result-avatar">
            <img id="resultYouImg" src="" alt="You">
          </div>
          <div class="result-rating" id="resultYouRating">3/10</div>
          <div class="result-rating-label">You</div>
        </div>

        <div class="result-vs">VS</div>

        <div class="result-person">
          <div class="result-avatar">
            <img id="resultThemImg" src="" alt="Them">
          </div>
          <div class="result-rating" id="resultThemRating">9/10</div>
          <div class="result-rating-label">Them</div>
        </div>
      </div>

      <div class="result-verdict" id="resultVerdict"></div>

      <div class="chance-meter">
        <div class="chance-label">
          <span id="chancePercent">0%</span> chance
        </div>
        <div class="chance-bar-track">
          <div class="chance-bar-fill" id="chanceBarFill"></div>
        </div>
      </div>

      <div class="result-subtext" id="resultSubtext"></div>

      <button class="try-again-btn" onclick="resetAll()">Try Again</button>
    </div>
  </div>

  <script>
    // ── Upload handling ──
    function handleUpload(input, who) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const circle = document.getElementById(who === 'you' ? 'uploadYou' : 'uploadThem');
        const preview = document.getElementById(who === 'you' ? 'previewYou' : 'previewThem');
        preview.src = e.target.result;
        circle.classList.add('has-image');
      };
      reader.readAsDataURL(file);
    }

    // ── Screen switching ──
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Loading flow ──
    const loadingMessages = [
      'Scanning your face...',
      'Scanning their face...',
      'Comparing features...',
      'Calculating your chances...'
    ];

    function startAnalysis() {
      const youHas = document.getElementById('uploadYou').classList.contains('has-image');
      const themHas = document.getElementById('uploadThem').classList.contains('has-image');

      if (!youHas || !themHas) {
        const btn = document.querySelector('.check-btn');
        btn.classList.remove('shake');
        void btn.offsetWidth;
        btn.classList.add('shake');
        btn.addEventListener('animationend', () => btn.classList.remove('shake'), { once: true });
        return;
      }

      showScreen('screen-loading');

      const steps = document.querySelectorAll('.loading-step');
      steps.forEach(s => {
        s.classList.remove('visible', 'done');
        s.querySelector('.step-icon').className = 'step-icon arrow';
        s.querySelector('.step-icon').innerHTML = '&#9656;';
      });

      let current = 0;

      function advanceStep() {
        if (current > 0) {
          const prev = steps[current - 1];
          prev.classList.add('done');
          const icon = prev.querySelector('.step-icon');
          icon.className = 'step-icon check';
          icon.innerHTML = '&#10003;';
        }

        if (current < steps.length) {
          steps[current].classList.add('visible');
          current++;
          setTimeout(advanceStep, 1000);
        } else {
          setTimeout(showResult, 600);
        }
      }

      setTimeout(advanceStep, 300);
    }

    // ── Chance formula ──
    function calcChance(you, them) {
      const diff = them - you;
      if (diff <= 0) return 95;
      if (diff === 1) return 80;
      if (diff === 2) return 55;
      if (diff === 3) return 35;
      if (diff === 4) return 18;
      if (diff === 5) return 8;
      return 3;
    }

    // ── Hardcoded results (will be replaced by AI later) ──
    const verdicts = [
      { you: 3, them: 9, text: "You're cooked bro, she's outta your league fr fr", sub: "Maybe focus on yourself for a bit king", color: "red" },
      { you: 4, them: 8, text: "Bro thinks he has a chance lmaooo", sub: "The delusion is strong with this one", color: "red" },
      { you: 5, them: 7, text: "You might just pull this off if you rizz hard enough", sub: "Better have a personality that carries", color: "yellow" },
      { you: 6, them: 7, text: "Not impossible, shoot your shot carefully", sub: "One wrong move and it's over though", color: "yellow" },
      { you: 4, them: 9, text: "Nah this ain't it chief, respectfully", sub: "Sometimes you gotta know when to fold", color: "red" },
      { you: 3, them: 8, text: "Delusional but we respect the confidence", sub: "Confidence is key... but so is being realistic", color: "red" },
      { you: 5, them: 6, text: "Hmm this could actually work no cap", sub: "You're not as far off as you think", color: "green" },
      { you: 6, them: 8, text: "It's giving audacity but maybe just maybe", sub: "Stranger things have happened fr", color: "yellow" },
    ];

    function showResult() {
      const v = verdicts[Math.floor(Math.random() * verdicts.length)];

      document.getElementById('resultYouImg').src = document.getElementById('previewYou').src;
      document.getElementById('resultThemImg').src = document.getElementById('previewThem').src;
      document.getElementById('resultYouRating').textContent = v.you + '/10';
      document.getElementById('resultThemRating').textContent = v.them + '/10';

      const verdictEl = document.getElementById('resultVerdict');
      verdictEl.textContent = v.text;
      verdictEl.className = 'result-verdict verdict-' + v.color;

      document.getElementById('resultSubtext').textContent = v.sub;

      const chance = calcChance(v.you, v.them);
      document.getElementById('chancePercent').textContent = chance + '%';
      const fill = document.getElementById('chanceBarFill');
      fill.style.width = '0%';
      fill.style.background = chance <= 30 ? '#f87171' : chance <= 60 ? '#facc15' : '#4ade80';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          fill.style.width = chance + '%';
        });
      });

      showScreen('screen-result');
    }

    // ── Reset ──
    function resetAll() {
      showScreen('screen-home');

      ['uploadYou', 'uploadThem'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('has-image');
        el.querySelector('input').value = '';
      });

      document.getElementById('previewYou').src = '';
      document.getElementById('previewThem').src = '';
    }

    // ── Ticker (home screen) ──
    function generateAvatarURL(seed) {
      const colors = ['264653','2a9d8f','e9c46a','f4a261','e76f51','6a4c93','1982c4','8ac926','ff595e','ffca3a'];
      const bg = colors[seed % colors.length];
      return `https://ui-avatars.com/api/?name=${String.fromCharCode(65 + (seed % 26))}&background=${bg}&color=fff&size=64&bold=true`;
    }

    const names = [
      'alex & maya', 'jordan & riley', 'sam & taylor', 'chris & jamie',
      'max & sofia', 'leo & chloe', 'ethan & emma', 'jake & lily',
      'noah & aria', 'ryan & zoe', 'liam & mia', 'kai & luna',
      'owen & isla', 'finn & ella', 'dylan & ava', 'matt & nina'
    ];
    const tickerResults = ['72% — yes', '23% — no', '51% — maybe', '88% — yes', '15% — no', '67% — maybe',
                     '91% — yes', '34% — no', '45% — maybe', '79% — yes', '12% — no', '58% — maybe',
                     '83% — yes', '27% — no', '41% — maybe', '95% — yes'];

    function getResultClass(r) {
      if (r.includes('yes')) return 'yes';
      if (r.includes('no')) return 'no';
      return 'maybe';
    }

    function buildTicker(el, offset) {
      let html = '';
      for (let round = 0; round < 2; round++) {
        for (let i = 0; i < names.length; i++) {
          const idx = (i + offset) % names.length;
          const s1 = (idx * 7 + 3) % 26;
          const s2 = (idx * 11 + 5) % 26;
          html += `
            <div class="ticker-tag">
              <div class="pair">
                <div class="mini-avatar"><img src="${generateAvatarURL(s1)}" alt=""></div>
                <div class="mini-avatar"><img src="${generateAvatarURL(s2)}" alt=""></div>
              </div>
              <span class="tag-result ${getResultClass(tickerResults[idx])}">${names[idx]} — ${tickerResults[idx]}</span>
            </div>`;
        }
      }
      el.innerHTML = html;
    }

    buildTicker(document.getElementById('ticker1'), 0);
    buildTicker(document.getElementById('ticker2'), 8);
  </script>
</body>
</html>
